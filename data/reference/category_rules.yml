# Rules for filtering and tagging ceremonial designation bills.
#
# Order of operations in scraper/categorize.py:
#   1. exclude (drop bill entirely, log reason to audit_rejected.csv)
#   2. include (bill must match at least one pattern or it's dropped)
#   3. categorize (assign all matching category tags)
#   4. subcategorize (assign keyword-based tags within each category)
#   5. priority (pick primary category for default views)
#
# Patterns are Python regex, case-insensitive. Edit this file to refine the
# filter — the scraper reads it at runtime, no code change needed. See
# docs/METHODOLOGY.md for the intent behind each rule.

# Bills whose synopsis matches ANY exclude pattern are dropped with a reason.
exclude:
  - name: administrative_officer
    # Allows a single word between "designates" and the office noun so synopses
    # like "Designates State Office of Emergency Management ..." still drop out.
    # BUT: negative lookahead spares "Designates the Department of Education
    # Building as ..." — a building naming that happens to contain 'Department'.
    # If a place noun appears between the admin noun and "as", it's a place
    # designation, not an administrative designation.
    pattern: '\bdesignates?\s+(the\s+)?(\w+\s+)?(attorney\s+general|commissioner|secretary|director|department|division|board|commission|authority|bureau|office|chief|executive)\b(?!\s+\w+.{0,80}\b(building|center|hall|facility|complex|court|plaza)\b)'
    reason: "administrative officer/body designation"
  - name: regulatory_category
    pattern: '\bdesignates?\b.{0,80}\bas\s+(an?\s+)?(internet|online|regulatory|administrative|primary|secondary)\b'
    reason: "regulatory/administrative category definition"
  - name: responsible_agency
    # "Designates State Office of Emergency Management as State Agency for Surplus Property"
    # — catches any "as state agency" usage, not just "agency responsible".
    pattern: '\bdesignates?\b.{0,120}\bas\s+(the\s+)?state\s+agency\b'
    reason: "designates state agency"
  - name: legal_definition
    pattern: '\bdesignates?\b.{0,80}\bas\s+(a\s+)?(first\s+responders?|public\s+employees?|emergency\s+response)\b'
    reason: "legal/workforce classification"
  - name: renames_authority
    # "Renames the State Parole Board as the State Parole Commission." —
    # administrative body rename. Allows a few modifier words between "renames"
    # and the admin noun. Exempts "building/center/hall" so building renamings
    # still pass.
    pattern: '\brenames?\s+(.{0,40}?\s+)?(authority|commission|division|department|board|bureau|office|agency)\b(?!\s+\w+.{0,80}\b(building|center|hall|facility|complex)\b)'
    reason: "administrative body rename"

# A bill must match at least one include pattern to be kept.
# These are broad; they let in some borderline cases that category rules then
# sort or leave as other_ceremonial for human review.
include:
  - name: state_x
    # "as [nj/n.j./new jersey/new jersey's] State X" — catches state symbols
    # regardless of whether the synopsis writer uses "state", "NJ State",
    # "N.J. State", "New Jersey State", etc.
    pattern: "\\bas\\s+(the\\s+)?(official\\s+)?(nj\\s+|n\\.j\\.\\s+|new\\s+jersey\\s+|new\\s+jersey'?s?\\s+)?state\\b"
  - name: direct_state_designation
    # "Designates six State songs." / "Designates the State Song, State Anthem..."
    # — bills that designate a state symbol directly, no intervening "as".
    pattern: '\bdesignates?\s+(\w+\s+){0,4}state\s+(song|anthem|symbol|slogan|nickname|motto|seal|march|bird|flower|tree|fish|fruit|vegetable|muffin|candy|beverage|insect|mineral|gem|stone|fossil|soil|dance|sport|dinosaur|microbe|shell|color|animal|locomotive|vessel|ship)s?\b'
  - name: official_x
    pattern: '\bas\s+(the\s+)?official\b'
  - name: public_holiday
    pattern: '\b(public|state)\s+holiday\b'
  - name: day_week_month_year
    # Day / week / weekend / month / year observance. Pattern covers "as X day",
    # "day as X", "designates ... day" (no 'as'), plus year-long observances
    # like "designates 2026 as Year of Black History." Uses `.` not `[^.]`
    # so abbreviations like "U.S." or "St." don't break the match.
    pattern: '\b(day|week|weekend|month|year)\b.{0,80}\bas\b|\bas\b.{0,80}\b(day|week|weekend|month|year)\b|\bdesignates?\b.{0,120}\b(day|week|weekend|month)\b|\bdesignates?\s+\d{4}\s+as\b'
  - name: commemorates
    # Commemorative / celebratory resolutions.
    # Covers "Commemorates 126th anniversary of Jewish War Veterans" and
    # "Commemorates life and accomplishments of Chief Roy Crazy Horse".
    pattern: '\b(commemorates?|celebrates?|recognizes?|honors?)\b.{0,80}\b(anniversary|birthday|independence|day|week|weekend|month|year|holiday|heritage|remembrance|memorial|founding|life|accomplishments|service|contributions|legacy|work)\b'
  - name: annual_event
    # "Declares reenactment of Battle of Monmouth an annual event" — genuinely
    # ceremonial even when not a day/week/month.
    pattern: '\bannual\s+event\b'
  - name: road_or_place
    pattern: '\b(highway|route\s+\d+|bridge|interchange|rest\s+area|overpass|expressway|parkway|road|street|canal|trail|rail\s+station|train\s+station|ferry\s+terminal|park|building|plaza|hall|facility|center)\b'
  - name: quoted_name
    pattern: '\bdesignates?\b.{0,120}\bas\s+["“‘]'

# Category tags. A bill gets ALL matching tags. The 'priority' section below
# decides which tag wins when we need a single "primary" category.
categories:
  state_symbol:
    # Negative lookahead on road/place nouns so "State Highway Route 71" in a
    # road-naming bill doesn't get miscategorized as a state symbol.
    patterns:
      - "\\bas\\s+(the\\s+)?(official\\s+)?(nj\\s+|n\\.j\\.\\s+|new\\s+jersey\\s+|new\\s+jersey'?s?\\s+)?state\\b(?!\\s+(highway|route|bridge|interchange|rest\\s+area|overpass|expressway|parkway|park|rail|agency|responsible|police|department|division|office))"
      - "\\bas\\s+(the\\s+)?official\\s+state\\b(?!\\s+(highway|route|bridge|interchange|rest\\s+area|overpass|expressway|parkway|park|rail|agency|responsible|police|department|division|office))"
      # "as official color/mineral/slogan/etc." — independent nouns. Curated so
      # "official state agency" and similar admin terms don't slip in.
      - '\bas\s+(the\s+)?official\s+(color|gem|stone|mineral|insignia|emblem|motto|slogan|nickname|symbol|song|fruit|flower|tree|bird|fish|fossil|soil|dance|sport|muffin|shell|microbe|dinosaur|vessel|ship|locomotive)\b'
      # "as official [X] of (the) State" — catches "official mineral of State of NJ"
      # and "official Junior and Senior Ancient Fife and Drum Corps of New Jersey"
      # (multi-word descriptor between 'official' and 'of State').
      - '\bas\s+(the\s+)?official\s+.{1,120}?\s+of\s+(the\s+)?(nj|new\s+jersey|state\s+of|state)\b'
      # "Designates New Jersey as 'Bill of Rights State'" — state nickname on
      # license plate / branding.
      - '\bdesignates?\s+(nj|new\s+jersey)\s+as\b'
      # "as new State slogan" / "as the State song" — allows an adjective
      # between "as" and "state" when followed by a known symbol noun.
      - '\bas\s+(a\s+|the\s+|new\s+)?state\s+(slogan|nickname|song|symbol|motto|seal|anthem)\b'
      # Direct "Designates [modifier] State X" bills with no "as". Matches
      # "Designates six State songs" and "Designates the State Song, State Anthem...".
      - '\bdesignates?\s+(\w+\s+){0,4}state\s+(song|anthem|symbol|slogan|nickname|motto|seal|march|bird|flower|tree|fish|fruit|vegetable|muffin|candy|beverage|insect|mineral|gem|stone|fossil|soil|dance|sport|dinosaur|microbe|shell|color|animal|locomotive|vessel|ship)s?\b'
    subcategories:
      food:   ['muffin', 'fruit', 'vegetable', 'beverage', 'dessert', 'candy', 'taffy', 'pie', 'bread', 'cheese', 'ice cream']
      nature: ['bird', 'flower', 'tree', 'insect', 'pollinator', 'bee', 'reptile', 'amphibian', 'fish', 'mammal', 'butterfly', 'animal', 'seashell', 'shell']
      culture: ['song', 'dance', 'sport', 'poem', 'motto', 'locomotive', 'ship', 'vessel', 'dinosaur', 'microbe', 'slogan', 'nickname', 'fife', 'drum']
      geology: ['rock', 'mineral', 'fossil', 'soil', 'gem']

  holiday_observance:
    # Uses `.` instead of `[^.]` so synopses with "U.S." / "St." / etc. don't
    # prematurely terminate the match.
    patterns:
      - '\b(public|state)\s+holiday\b'
      - '\b(day|week|weekend|month|year)\b.{0,80}\bas\b'
      - '\bas\b.{0,80}\b(day|week|weekend|month|year)\b'
      - '\bdesignates?\b.{0,120}\b(day|week|weekend|month)\b'
      - '\bdesignates?\s+\d{4}\s+as\b'
      - '\b(commemorates?|celebrates?|recognizes?|honors?)\b.{0,80}\b(anniversary|birthday|independence|day|week|weekend|month|year|holiday|heritage|remembrance|memorial|founding|life|accomplishments|service|contributions|legacy|work)\b'
      # "Declares reenactment of Battle of Monmouth an annual event..." —
      # reenactment declarations are holiday-ish (recurring observance).
      - '\bannual\s+event\b'
      - '\breenactment\b'
    subcategories:
      awareness: ['awareness', 'prevention']
      commemoration: ['memorial', 'remembrance', 'commemorate', 'commemoration', 'in honor of', 'patriot day', 'september 11', 'veterans', 'holocaust']
      heritage: ['heritage', 'history month', 'pride']

  road_naming:
    patterns:
      - '\b(highway|route\s+\d+|bridge|interchange|rest\s+area|overpass|expressway|parkway|street)\b'
    subcategories:
      bridge: ['bridge', 'overpass']
      highway: ['highway', 'route', 'expressway', 'parkway', 'interchange']
      rest_area: ['rest area', 'rest stop']
      street: ['street']

  place_naming:
    patterns:
      # Plain "center" catches trauma/community/convention/etc. centers.
      # We already exclude admin-body centers via the administrative_officer and
      # renames_authority rules that run earlier in the pipeline.
      - '\b(park|building|rail\s+station|train\s+station|ferry\s+terminal|plaza|court|center|complex|hall|trail|canal|facility|peninsula)\b'
      - '\bdesignates\s+and\s+preserves?\b'
    subcategories:
      transit: ['rail station', 'train station', 'ferry', 'transit', 'terminal']
      civic: ['park', 'building', 'plaza', 'court', 'hall', 'peninsula', 'preserve', 'welcome center', 'visitor center', 'complex', 'facility']
      trail: ['trail', 'canal']

# Higher priority wins when we need a single "primary" category for a bill.
# state_symbol beats place_naming when both match (e.g. "designates Caven Point
# as state natural habitat" would tag both, but state_symbol is what readers
# care about first).
# holiday_observance wins over state_symbol: bills like "designates September 11
# as State and public holiday" legitimately match both ("as State" and "public
# holiday"), but the journalistic story is the holiday, not the symbol.
priority:
  - holiday_observance
  - state_symbol
  - road_naming
  - place_naming
