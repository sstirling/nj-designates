<!--
  Favicon — a simplified version of hereby-designated-logo.svg.

  Design notes:
  - Curved seal text and dividing stars from the full logo are dropped: at
    16x16/32x32 they degrade into smudge. The medallion is enlarged to fill
    the space the text used to occupy, so the NJ shape stays recognizable.
  - Navy / cream / red palette matches the full logo verbatim so the tab
    icon reads as the same brand.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Hereby Designated">
  <title>Hereby Designated</title>

