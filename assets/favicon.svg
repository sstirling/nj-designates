  <!-- Cream background disc -->
  <circle cx="256" cy="256" r="252" fill="#F5F1E8"/>

  <!-- Heavy navy ring. Thicker than the full logo's because there's no inner
       text band to host. Reads cleanly down to 16x16. -->
  <circle cx="256" cy="256" r="232" fill="#0B2545" stroke="#0B2545" stroke-width="20"/>

  <!-- Cream NJ outline, scaled + centered inside the navy disc.
       NJ path bounds: 125.08 x 240. Target height ~360 (filling more of the
       medallion than the full logo, since we removed text bands).
       scale = 360/240 = 1.5; center (62.54, 120). -->
  <g transform="translate(256 256) scale(1.5) translate(-62.54 -120)">
    <use href="#nj-fav"/>
    <!-- Trenton — small red dot. Larger relative size than the full logo so
         it survives at 16x16. -->
    <circle cx="60.02" cy="112.31" r="9" fill="#E63946"/>
  </g>
</svg>
