  <!-- Background -->
  <circle cx="256" cy="256" r="252" fill="#F5F1E8"/>

  <!-- Outer heavy ring -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#0B2545" stroke-width="10"/>

  <!-- Thin inner border line -->
  <circle cx="256" cy="256" r="232" fill="none" stroke="#0B2545" stroke-width="1.4"/>

  <!-- Inner bordering line for the text band -->
  <circle cx="256" cy="256" r="192" fill="none" stroke="#0B2545" stroke-width="1.4"/>

  <!-- Top curved text: HEREBY DESIGNATED -->
  <text font-family="Georgia, 'Times New Roman', serif" font-size="24" font-weight="900" fill="#0B2545" letter-spacing="4">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">HEREBY DESIGNATED</textPath>
  </text>

  <!-- Bottom curved text: motto -->
  <text font-family="Georgia, 'Times New Roman', serif" font-size="15" font-weight="700" fill="#E63946" letter-spacing="5">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">AD HOC ET DECORUM</textPath>
  </text>

  <!-- Left & right red stars dividing top/bottom text -->
  <g fill="#E63946">
    <use href="#star" x="42" y="256" width="18" height="18"/>
    <use href="#star" x="470" y="256" width="18" height="18"/>
  </g>

  <!-- Medallion: inner dark disc -->
  <circle cx="256" cy="256" r="184" fill="#0B2545"/>
  <circle cx="256" cy="256" r="184" fill="none" stroke="#F5F1E8" stroke-width="3"/>
  <circle cx="256" cy="256" r="174" fill="none" stroke="#F5F1E8" stroke-width="1"/>

  <!-- New Jersey outline, centered and fitted inside medallion -->
  <!-- NJ path bounds: 0..125.08 x 0..240; center (62.54, 120). Trenton ≈ (60.02, 112.31). -->
  <!-- Target height ~ 300; scale = 300/240 = 1.25 -->
  <g transform="translate(256 258) scale(1.25) translate(-62.54 -120)">
    <use href="#nj"/>
    <!-- Trenton star marker -->
    <g fill="#E63946" transform="translate(60.02 112.31)">
      <polygon points="0,-5 1.47,-1.55 5,-1.55 2.14,0.59 3.09,4.05 0,2.0 -3.09,4.05 -2.14,0.59 -5,-1.55 -1.47,-1.55"/>
    </g>
  </g>
</svg>
