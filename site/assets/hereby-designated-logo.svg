<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Hereby Designated official seal">
  <title>Hereby Designated — Mock Official Seal</title>

  <defs>
    <!-- Curved text paths live in the CREAM band (between r=192 and r=232) -->
    <!-- Top arc at r=210 (center of band). Text ascenders go outward. -->
    <path id="topArc" d="M 46 256 A 210 210 0 0 1 466 256" fill="none"/>
    <!-- Bottom arc at r=210. Text ascenders go inward. -->
    <path id="bottomArc" d="M 46 256 A 210 210 0 0 0 466 256" fill="none"/>

    <!-- Reusable five-point star -->
    <symbol id="star" viewBox="-10 -10 20 20" overflow="visible">
      <polygon points="0,-10 2.94,-3.09 9.51,-3.09 4.29,1.18 6.18,8.09 0,4.00 -6.18,8.09 -4.29,1.18 -9.51,-3.09 -2.94,-3.09"/>
    </symbol>

