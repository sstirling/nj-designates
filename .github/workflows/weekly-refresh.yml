name: Weekly data refresh

# Friday night ET → Saturday 05:00 UTC (12 AM EST / 1 AM EDT).
on:
  schedule:
    - cron: "0 5 * * 6"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SESSION: "2026"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # cairosvg needs libcairo2 at runtime; ubuntu-latest usually has it,
      # but install explicitly so a runner image change doesn't silently break us.
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libcairo2

      - name: Install Python deps
        run: pip install -r requirements.txt

      # Cache only the per-bill detail files. fetch_bill_details.py uses an
      # LDOA-based manifest to skip bills whose state is unchanged, so caching
      # this directory means weekly runs only spend API calls on new or
      # changed bills.
      #
      # We deliberately do NOT cache data/raw/.cache (the request-level cache
      # used by api_client.Client) — the search request body is identical
      # every week, so caching it would suppress discovery of newly filed
      # bills. The same .cache also stores per-bill GETs whose URLs don't
      # encode LDOA, so a cached entry can return stale sponsors after a bill
      # changes. Skipping it forces fresh API responses; the per-bill JSON
      # files above still provide correct LDOA-based caching.
      - name: Restore bill-details cache
        uses: actions/cache@v4
        with:
          path: data/raw/bill_details
          key: nj-leg-bill-details-${{ env.SESSION }}-${{ github.run_id }}
          restore-keys: |
            nj-leg-bill-details-${{ env.SESSION }}-

      - name: Run test suite
        run: pytest

      # Fetch is current-session-only — closed sessions don't change.
      # Build uses --augment so the committed bills.parquet supplies rows for
      # all the OTHER sessions whose raw data isn't on this runner. Without
      # --augment the build would rewrite meta.json with totals for just 2026.
      - name: Fetch current session
        run: python -m scraper --verbose fetch --session "$SESSION"

      - name: Rebuild current session, preserving historical archive
        run: python -m scraper --verbose build --session "$SESSION" --augment

      - name: Regenerate social card
        run: python scripts/make_social_card.py

      - name: Open pull request with refreshed data
        uses: peter-evans/create-pull-request@v6
        with:
          branch: bot/weekly-refresh
          base: main
          title: "Weekly data refresh (session ${{ env.SESSION }})"
          commit-message: "chore: weekly data refresh (session ${{ env.SESSION }})"
          body: |
            Automated weekly refresh of session ${{ env.SESSION }} bills from the NJ Legislature API.

            Review the diffs below before merging:
            - `data/meta.json` — totals and per-category counts.
            - `data/bills.json` — site dataset.
            - `data/movement.json` — bills that advanced in the last 7 days.
            - `data/sessions.json` — session list.
            - `data/processed/bills.parquet` — columnar audit copy.
            - `data/processed/audit_rejected.csv` — every bill the filter dropped, with reason.
            - `assets/social-card.png` — Open Graph image regenerated from the new totals.

            Triggered by `.github/workflows/weekly-refresh.yml`. If nothing changed upstream this PR will not open.
          add-paths: |
            data/bills.json
            data/meta.json
            data/movement.json
            data/sessions.json
            data/processed/bills.parquet
            data/processed/audit_rejected.csv
            assets/social-card.png
          delete-branch: true
